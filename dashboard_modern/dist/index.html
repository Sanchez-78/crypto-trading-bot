<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoMaster Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f0f; color: #ccc; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .header { margin-bottom: 30px; }
    .header h1 { font-size: 28px; color: #fff; margin-bottom: 10px; }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .metric-card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 20px; }
    .metric-label { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 8px; }
    .metric-value { font-size: 32px; font-weight: bold; }
    .metric-value.positive { color: #4ade80; }
    .metric-value.negative { color: #f87171; }
    .metric-value.neutral { color: #60a5fa; }
    .tables { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    table { width: 100%; border-collapse: collapse; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
    thead { background: #222; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; font-size: 13px; }
    th { font-weight: 600; color: #aaa; }
    .status-ok { color: #4ade80; }
    .status-warn { color: #fbbf24; }
    .status-fail { color: #f87171; }
    .loading { text-align: center; padding: 40px; color: #666; }
  </style>
  <script type="module" crossorigin src="/v2/assets/index-c2eadab0.js"></script>
</head>
<body>
  <div id="root"></div>
  
</body>
</html>
