name: Hetzner Apply Symbol Blacklist

# Reviewer-approved forward-test (2026-07-15): drop anti-edge symbols from
# paper signal generation via the existing PAPER_SYMBOL_BLACKLIST gate
# (signal_generator.py:675-677, commit 59dd273).
#
# Evidence (859-trade production history): BNBUSDT 0/72 wins, XRPUSDT 1/65
# wins — Wilson 95% upper bounds ~5%/~8% WR. DOTUSDT (2/34) is HELD OUT
# pending a time-distribution check (reviewer condition #1).
#
# Reviewer conditions implemented here:
#   - prints loss time-distribution by day/regime BEFORE applying (cond #2)
#   - captures rolling-100 baseline pre-flight (cond #4)
#   - action=revert removes the line for instant rollback
#   - re-evaluation after +100 closes is tracked by the monitoring loop (cond #3)
#
# SAFETY: hard-blocks live_real/ENABLE_REAL_ORDERS/LIVE_TRADING_CONFIRMED.
# Touches EXACTLY ONE env key (PAPER_SYMBOL_BLACKLIST); never edits other lines.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'apply | revert | status'
        required: true
        default: 'apply'
        type: choice
        options: ['apply', 'revert', 'status']
      symbols:
        description: 'Comma list for apply (reviewer-approved default)'
        required: false
        default: 'BNBUSDT,XRPUSDT'

jobs:
  blacklist:
    name: Apply/revert paper symbol blacklist
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key and pin host key
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/hetzner_deploy_key
          chmod 600 ~/.ssh/hetzner_deploy_key
          ssh-keyscan -p 22 -T 15 "$HETZNER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          [ -s ~/.ssh/known_hosts ] || { echo "host unreachable"; exit 1; }
          chmod 600 ~/.ssh/known_hosts

      - name: Apply on server
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PROJECT_DIR: ${{ secrets.HETZNER_PROJECT_DIR }}
          HETZNER_SERVICE_NAME: ${{ secrets.HETZNER_SERVICE_NAME }}
          ACTION: ${{ inputs.action }}
          SYMBOLS: ${{ inputs.symbols }}
        run: |
          SSH_OPTS="-p 22 -i ~/.ssh/hetzner_deploy_key -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts -o ConnectTimeout=30 -o BatchMode=yes"

          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" \
            "PROJECT_DIR='$HETZNER_PROJECT_DIR' SERVICE_NAME='$HETZNER_SERVICE_NAME' ACTION='$ACTION' SYMBOLS='$SYMBOLS' bash -s" << 'REMOTE_EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$PROJECT_DIR"

          # ── Safety gates: never proceed with live flags ──────────────────
          for pair in "TRADING_MODE live_real" "ENABLE_REAL_ORDERS true" "LIVE_TRADING_CONFIRMED true"; do
            key="${pair% *}"; bad="${pair#* }"
            v="$(grep -E "^[[:space:]]*(export[[:space:]]+)?${key}=" .env 2>/dev/null | tail -1 | cut -d= -f2- | tr -d '\"'"'"' ' | tr 'A-Z' 'a-z' || true)"
            if [ "$v" = "$bad" ] || { [ "$bad" = "true" ] && { [ "$v" = "1" ] || [ "$v" = "yes" ] || [ "$v" = "on" ]; }; }; then
              echo "CRITICAL: .env has ${key}=${v} — refusing to touch anything"
              exit 1
            fi
          done
          echo "Safety gates OK"

          # ── Cond #4: rollback baseline (rolling-100 + open positions) ────
          echo "== BASELINE (pre-change) =="
          curl -s -m 8 http://localhost:5001/api/dashboard/metrics 2>/dev/null | python3 -c '
          import json,sys
          d=json.load(sys.stdin)
          print("win_rate_pct:",d.get("win_rate_pct"),"pf:",d.get("profit_factor"),
                "open:",d.get("open_positions"),"total:",d.get("closed_trades"))' || echo "(dashboard unavailable)"

          # ── Cond #2: loss time-distribution for BNB/XRP/DOT ──────────────
          echo "== LOSS TIME-DISTRIBUTION (by day/regime) =="
          python3 - <<'PYEOF'
          import sqlite3
          conn = sqlite3.connect('file:local_learning_storage/cache.sqlite?mode=ro', uri=True, timeout=5)
          c = conn.cursor()
          for row in c.execute("""
              SELECT symbol, date(exit_ts,'unixepoch') d, COALESCE(regime,'?'),
                     COUNT(*), SUM(win)
              FROM closed_trades WHERE symbol IN ('BNBUSDT','XRPUSDT','DOTUSDT')
              GROUP BY symbol, d, regime ORDER BY symbol, d"""):
              print(' ', row)
          conn.close()
          PYEOF

          # ── Apply / revert exactly one env key ────────────────────────────
          if [ "$ACTION" = "status" ]; then
            grep -n "^PAPER_SYMBOL_BLACKLIST=" .env || echo "PAPER_SYMBOL_BLACKLIST not set"
            exit 0
          fi
          cp .env .env.bak.blacklist
          sed -i '/^PAPER_SYMBOL_BLACKLIST=/d' .env
          if [ "$ACTION" = "apply" ]; then
            echo "PAPER_SYMBOL_BLACKLIST=$SYMBOLS" >> .env
            echo "Applied: PAPER_SYMBOL_BLACKLIST=$SYMBOLS"
          else
            echo "Reverted: PAPER_SYMBOL_BLACKLIST removed"
          fi

          # ── Restart + verify ──────────────────────────────────────────────
          systemctl restart "$SERVICE_NAME"
          sleep 12
          ACTIVE="$(systemctl is-active "$SERVICE_NAME" 2>/dev/null || echo inactive)"
          echo "service: $ACTIVE"
          if [ "$ACTIVE" != "active" ]; then
            echo "ROLLBACK: restoring .env and restarting"
            mv .env.bak.blacklist .env
            systemctl restart "$SERVICE_NAME"
            exit 1
          fi
          journalctl -u "$SERVICE_NAME" -n 30 --no-pager 2>/dev/null | grep -iE "blacklist|BOOT_VERSION" | head -5 || true
          echo ""
          echo "live_real enabled:       no (gate-checked)"
          echo "ENABLE_REAL_ORDERS:      no (gate-checked)"
          echo "LIVE_TRADING_CONFIRMED:  no (gate-checked)"
          REMOTE_EOF
