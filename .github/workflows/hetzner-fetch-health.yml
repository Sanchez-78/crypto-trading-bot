name: Hetzner Health Fetch

# Read-only observability workflow.
# SSHes into Hetzner, reads latest_health.md / latest_deploy_status.md and
# a sanitized journalctl tail, then publishes them as GitHub Actions artifacts.
#
# SAFETY: no writes, no restarts, no trading-core changes. Read-only.
#
# Required GitHub Secrets (shared with hetzner-one-time-install):
#   HETZNER_HOST          - server IP or hostname
#   HETZNER_USER          - SSH login user
#   HETZNER_SSH_KEY       - private key
#   HETZNER_PROJECT_DIR   - absolute path on server
#   HETZNER_SERVICE_NAME  - systemd service name
#
# Optional:
#   HETZNER_PORT          - SSH port (default 22)

on:
  workflow_dispatch:
  schedule:
    # Every 2 hours — aligns with the 2h autodeploy timer cadence.
    - cron: '5 */2 * * *'

jobs:
  fetch:
    name: Fetch health reports from Hetzner
    runs-on: ubuntu-latest

    steps:
      # ── 1. SSH setup ────────────────────────────────────────────────────────
      - name: Set up SSH key and pin host key
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          SSH_PORT: ${{ vars.HETZNER_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/hetzner_deploy_key
          chmod 600 ~/.ssh/hetzner_deploy_key
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -T 15 "$HETZNER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "CRITICAL: ssh-keyscan returned no keys — host unreachable"
            exit 1
          fi
          chmod 600 ~/.ssh/known_hosts

      # ── 2. Fetch reports + sanitized log tail from server ─────────────────
      - name: Fetch health reports and sanitized logs
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PROJECT_DIR: ${{ secrets.HETZNER_PROJECT_DIR }}
          HETZNER_SERVICE_NAME: ${{ secrets.HETZNER_SERVICE_NAME }}
          SSH_PORT: ${{ vars.HETZNER_PORT || '22' }}
        run: |
          PORT="${SSH_PORT:-22}"
          SSH_OPTS="-p $PORT -i ~/.ssh/hetzner_deploy_key \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o ConnectTimeout=30 \
            -o BatchMode=yes"

          mkdir -p artifacts

          # ── Read latest_deploy_status.md ─────────────────────────────────
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" \
            "cat '$HETZNER_PROJECT_DIR/reports/latest_deploy_status.md' 2>/dev/null || echo 'NOT FOUND'" \
            > artifacts/latest_deploy_status.md

          # ── Read latest_deploy_status.json ───────────────────────────────
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" \
            "cat '$HETZNER_PROJECT_DIR/reports/latest_deploy_status.json' 2>/dev/null || echo 'null'" \
            > artifacts/latest_deploy_status.json

          # ── Read latest_health.md ─────────────────────────────────────────
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" \
            "cat '$HETZNER_PROJECT_DIR/reports/latest_health.md' 2>/dev/null || echo 'NOT FOUND'" \
            > artifacts/latest_health.md

          # ── Read latest_health.json ───────────────────────────────────────
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" \
            "cat '$HETZNER_PROJECT_DIR/reports/latest_health.json' 2>/dev/null || echo 'null'" \
            > artifacts/latest_health.json

          # ── Fetch sanitized journalctl tail (last 300 lines) ──────────────
          # Redact common secret patterns before leaving the server.
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" "
            journalctl -u '$HETZNER_SERVICE_NAME' -n 300 --no-pager -o short-iso 2>/dev/null \
              | sed 's/\(key\|token\|secret\|password\|api_key\|apikey\|passwd\)\([=: ]\+\)[^ ,\"'\'']\+/\1\2[REDACTED]/gi' \
              || echo 'journalctl unavailable'
          " > artifacts/log_tail_sanitized.txt

          # ── Quick service status ──────────────────────────────────────────
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" "
            echo '=== cryptomaster service ===' && \
            systemctl status '$HETZNER_SERVICE_NAME' --no-pager -n 5 2>&1 || true && \
            echo '' && \
            echo '=== autodeploy timer ===' && \
            systemctl list-timers '*-autodeploy.timer' --no-pager 2>&1 || true
          " > artifacts/service_status.txt

          # ── Canonical close pipeline probe (audit PR6 / section 11) ───────
          # READ-ONLY. In shadow mode the canonical tables may not exist yet;
          # tolerate their absence. Verifies shadow agreement + effect ledger.
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" "
            echo '=== pipeline mode (.env, redacted) ===' && \
            grep -E '^[[:space:]]*(export[[:space:]]+)?PAPER_CANONICAL_PIPELINE=' '$HETZNER_PROJECT_DIR/.env' 2>/dev/null || echo 'PAPER_CANONICAL_PIPELINE not set (off)' && \
            echo '' && \
            echo '=== shadow agreement / conflicts (last 26h) ===' && \
            journalctl -u '$HETZNER_SERVICE_NAME' --since '26 hours ago' --no-pager 2>/dev/null \
              | grep -E 'CANONICAL_PIPELINE_SHADOW|CANONICAL_CLOSE_CONFLICT|CANONICAL_CLOSE_PERSIST_ERROR' \
              | sed 's/\(key\|token\|secret\|password\)\([=: ]\+\)[^ ,\"'\'']\+/\1\2[REDACTED]/gi' \
              | tail -200 || echo 'no canonical pipeline events (shadow off or no closes)' && \
            echo '' && \
            echo '=== canonical tables (read-only, may be absent in shadow) ===' && \
            DB='$HETZNER_PROJECT_DIR/local_learning_storage/cache.sqlite' && \
            sqlite3 \"file:\$DB?mode=ro\" \"SELECT 'canonical_closes='||COUNT(*) FROM paper_canonical_closes;\" 2>/dev/null || echo 'paper_canonical_closes: not present (shadow mode)' && \
            sqlite3 \"file:\$DB?mode=ro\" \"SELECT effect_type||':'||status||'='||COUNT(*) FROM paper_close_effects GROUP BY effect_type, status;\" 2>/dev/null || echo 'paper_close_effects: not present (shadow mode)'
          " > artifacts/canonical_pipeline_probe.txt

          # ── Firebase quota forensics (last 26h, targeted grep) ────────────
          # The raw tail is useless during log floods; grep the quota lifecycle
          # events directly so 429s vs. genuine read storms are distinguishable.
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" "
            journalctl -u '$HETZNER_SERVICE_NAME' --since '26 hours ago' --no-pager -o short-iso 2>/dev/null \
              | grep -E 'QUOTA_RESET|QUOTA_DEBUG|QUOTA_HARD_GATE|QUOTA_SOFT_GATE|QUOTA_CRITICAL|QUOTA_WARNING|429|FIREBASE_DEGRADED|QUOTA_EXHAUSTED|LEARNING.*health|CACHE_WARM|QUOTA_FIX' \
              | sed 's/\(key\|token\|secret\|password\|api_key\|apikey\|passwd\)\([=: ]\+\)[^ ,\"'\'']\+/\1\2[REDACTED]/gi' \
              | tail -400 \
              || echo 'no quota events found'
          " > artifacts/quota_forensics.txt

          # ── Deploy loop log (why git fetch fails at line 181) ─────────────
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" "
            echo '=== newest deploy_loop.log tail ===' && \
            LOG=\$(ls -t '$HETZNER_PROJECT_DIR'/reports/*/deploy_loop.log 2>/dev/null | head -1) && \
            echo \"file: \$LOG\" && tail -60 \"\$LOG\" 2>/dev/null | \
              sed 's#https://[^@]*@#https://[REDACTED]@#g' || echo 'no deploy_loop.log found' && \
            echo '' && \
            echo '=== autodeploy service journal (last 40 lines) ===' && \
            journalctl -u cryptomaster-autodeploy.service -n 40 --no-pager -o short-iso 2>/dev/null | \
              sed 's#https://[^@]*@#https://[REDACTED]@#g' || true && \
            echo '' && \
            echo '=== git remote scheme (sanitized) ===' && \
            git -C '$HETZNER_PROJECT_DIR' config --get remote.origin.url 2>&1 | \
              sed 's#//[^@/]*@#//[REDACTED]@#; s#\(github.com[:/][^ ]*\)#\1#' || true && \
            echo '=== repo owner vs root ===' && \
            stat -c 'repo owner: %U uid: %u' '$HETZNER_PROJECT_DIR/.git' 2>/dev/null || true && \
            echo '' && \
            echo '=== SHA identity (audit F2/F3): repo vs deployed vs ready vs boot ===' && \
            echo \"repo_head_sha:   \$(git -C '$HETZNER_PROJECT_DIR' rev-parse HEAD 2>/dev/null || echo unknown)\" && \
            echo \"deployed_bot_sha: \$(cat '$HETZNER_PROJECT_DIR/reports/deployed_bot_sha' 2>/dev/null || echo none)\" && \
            echo \"ready_bot_sha:    \$(cat '$HETZNER_PROJECT_DIR/reports/ready_bot_sha' 2>/dev/null || echo none)\" && \
            echo \"boot_bot_sha:     \$(cat '$HETZNER_PROJECT_DIR/reports/running_bot_sha' 2>/dev/null || echo none)\" && \
            echo \"deploy_hold:      \$([ -f '$HETZNER_PROJECT_DIR/.deploy_hold' ] && stat -c 'PRESENT uid=%u' '$HETZNER_PROJECT_DIR/.deploy_hold' || echo absent)\"
          " > artifacts/deploy_diagnostics.txt

          # ── Git failure reproduction (captures the real error text) ───────
          # The autodeploy journal rotates away within minutes (log flood), so
          # reproduce the failing git calls: once in the SSH context, once
          # inside a transient systemd unit replicating the service sandbox.
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" "
            cd '$HETZNER_PROJECT_DIR' || exit 0
            echo '=== ssh whoami / git version ==='
            echo \"user=\$(id -un) uid=\$(id -u) HOME=\$HOME\"
            git --version 2>&1
            echo ''
            echo '=== script version on server (lines 174-182) ==='
            sed -n '174,182p' scripts/hetzner_paper_train_deploy_and_audit.sh 2>/dev/null || echo 'script missing'
            echo ''
            echo '=== ssh-context git rev-parse ==='
            git rev-parse HEAD 2>&1 || true
            echo '=== ssh-context git fetch --dry-run ==='
            git fetch origin main --dry-run 2>&1 | sed 's#//[^@/]*@#//[REDACTED]@#g' || true
            echo ''
            echo '=== sandbox-replicated git rev-parse (systemd-run) ==='
            systemd-run --wait --collect --pipe --unit=cm-gitdiag-\$\$ \
              -p ProtectSystem=full -p PrivateTmp=true -p NoNewPrivileges=true \
              -p WorkingDirectory='$HETZNER_PROJECT_DIR' \
              -p 'ReadWritePaths=$HETZNER_PROJECT_DIR /tmp' \
              /usr/bin/git rev-parse HEAD 2>&1 || echo '(systemd-run unavailable or failed — see above)'
            echo '=== sandbox-replicated git fetch --dry-run ==='
            systemd-run --wait --collect --pipe --unit=cm-gitdiag2-\$\$ \
              -p ProtectSystem=full -p PrivateTmp=true -p NoNewPrivileges=true \
              -p WorkingDirectory='$HETZNER_PROJECT_DIR' \
              -p 'ReadWritePaths=$HETZNER_PROJECT_DIR /tmp' \
              /usr/bin/git fetch origin main --dry-run 2>&1 | sed 's#//[^@/]*@#//[REDACTED]@#g' || echo '(systemd-run unavailable or failed)'
            echo ''
            echo '=== root gitconfig state ==='
            ls -la /root/.gitconfig 2>&1 || true
            grep -A2 'safe' /root/.gitconfig 2>/dev/null || echo '(no safe.directory in /root/.gitconfig or unreadable)'
            echo '=== autodeploy unit + dropins on server ==='
            systemctl cat cryptomaster-autodeploy.service 2>&1 | head -40 || true
          " > artifacts/git_failure_repro.txt

          # ── Trading metrics probe (dashboard API + python3 aggregates) ──
          # Full JSON saved separately; aggregates computed from pnl_pct
          # (the win/pnl_usd fields are unreliable for a subset of trades).
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" \
            "curl -s -m 8 http://localhost:5001/api/dashboard/metrics 2>/dev/null || echo '{}'" \
            > artifacts/dashboard_metrics.json

          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" "
            curl -s -m 8 http://localhost:5001/api/dashboard/metrics 2>/dev/null | python3 -c '
          import json, sys, datetime
          try:
              d = json.load(sys.stdin)
          except Exception as e:
              print(f\"(dashboard JSON parse failed: {e})\"); sys.exit(0)
          trades = d.get(\"closed_trades_list\") or []
          now = datetime.datetime.now(datetime.timezone.utc).timestamp()
          def agg(win_s):
              sel = [t for t in trades if t.get(\"exit_time\", 0) > now - win_s]
              n = len(sel)
              if not n:
                  return f\"n=0\"
              wins = sum(1 for t in sel if float(t.get(\"pnl_pct\") or 0) > 0)
              pnl = sum(float(t.get(\"pnl_pct\") or 0) for t in sel)
              gw = sum(float(t[\"pnl_pct\"]) for t in sel if float(t.get(\"pnl_pct\") or 0) > 0)
              gl = -sum(float(t[\"pnl_pct\"]) for t in sel if float(t.get(\"pnl_pct\") or 0) < 0)
              pf = round(gw / gl, 3) if gl > 0 else float(\"inf\")
              return (f\"n={n} wins={wins} wr_pct={round(100*wins/n,2)} \"
                      f\"pnl_pct_sum={round(pnl,4)} pf={pf}\")
          print(\"total_closed_trades_field:\", d.get(\"closed_trades\"))
          print(\"list_len:\", len(trades))
          print(\"window_24h:\", agg(86400))
          print(\"window_7d:\", agg(604800))
          reasons = {}
          for t in trades:
              r = t.get(\"exit_reason\") or \"?\"
              reasons.setdefault(r, [0, 0])
              reasons[r][0] += 1
              reasons[r][1] += 1 if float(t.get(\"pnl_pct\") or 0) > 0 else 0
          for r, (n, w) in sorted(reasons.items(), key=lambda kv: -kv[1][0]):
              print(f\"exit_reason {r}: n={n} wr_by_pnl={round(100*w/n,1)}%\")
          sides = {}
          for t in trades:
              s = (t.get(\"side\") or \"?\") + \"/\" + (t.get(\"regime\") or \"?\")
              sides.setdefault(s, [0, 0])
              sides[s][0] += 1
              sides[s][1] += 1 if float(t.get(\"pnl_pct\") or 0) > 0 else 0
          for s, (n, w) in sorted(sides.items(), key=lambda kv: -kv[1][0])[:8]:
              print(f\"side/regime {s}: n={n} wr_by_pnl={round(100*w/n,1)}%\")
          ' 2>&1 || echo '(metrics aggregation failed)'
          " > artifacts/trading_metrics.txt

          # ── cache.sqlite direct probe (write-path vs read-path diagnosis) ─
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" "
            python3 - <<'PYEOF'
          import sqlite3, datetime
          db = '$HETZNER_PROJECT_DIR/local_learning_storage/cache.sqlite'
          try:
              conn = sqlite3.connect(f'file:{db}?mode=ro', uri=True, timeout=5)
              c = conn.cursor()
              c.execute('SELECT COUNT(*) FROM closed_trades')
              print('total rows:', c.fetchone()[0])
              c.execute('SELECT trade_id, symbol, side, exit_ts, pnl_pct, win, exit_reason FROM closed_trades ORDER BY exit_ts DESC LIMIT 6')
              for r in c.fetchall():
                  ts = datetime.datetime.utcfromtimestamp(r[3]).isoformat() if r[3] else '?'
                  print(ts, r[1], r[2], 'pnl_pct:', r[4], 'win:', r[5], r[6], r[0])
              conn.close()
          except Exception as e:
              print('cache.sqlite probe failed:', e)
          PYEOF
          " > artifacts/cache_sqlite_probe.txt 2>&1 || echo 'probe ssh failed' >> artifacts/cache_sqlite_probe.txt

          # ── Close-path forensics (why save_closed_trade stopped writing) ──
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" "
            journalctl -u '$HETZNER_SERVICE_NAME' --since '4 hours ago' --no-pager -o short-iso 2>/dev/null \
              | grep -E 'LOCAL_CACHE|SAVE_FAILED|PAPER_EXIT|LEARNING_SKIPPED|LEARNING_UPDATE|OperationalError|no column|KeyError|close_paper_position|Traceback' \
              | sed 's/\(key\|token\|secret\|password\|api_key\|apikey\|passwd\)\([=: ]\+\)[^ ,\"'\''\'']\+/\1\2[REDACTED]/gi' \
              | tail -120 \
              || echo 'no close-path events found'
          " > artifacts/close_path_forensics.txt

          # ── Restart-loop forensics (who stops the bot and why) ────────────
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" "
            echo '=== systemd start/stop events (6h) ==='
            journalctl -u '$HETZNER_SERVICE_NAME' --since '6 hours ago' --no-pager -o short-iso 2>/dev/null \
              | grep -E 'systemd\[1\]|Started|Stopping|Stopped|Main process|Failed with result|Consumed|oom|OOM|watchdog|Watchdog|Deactivated' \
              | tail -60 || true
            echo ''
            echo '=== unit restart config ==='
            systemctl show '$HETZNER_SERVICE_NAME' -p NRestarts -p Restart -p WatchdogUSec -p MemoryMax -p Result -p ExecMainStatus 2>&1 || true
            echo ''
            echo '=== STARTUP FAILED / exit markers (6h) ==='
            journalctl -u '$HETZNER_SERVICE_NAME' --since '6 hours ago' --no-pager -o short-iso 2>/dev/null \
              | grep -E 'STARTUP FAILED|CRASH DETECTED|sys.exit|MemoryError|Killed' | tail -20 || echo '(none)'
          " > artifacts/restart_forensics.txt

          # ── Edge analysis: where do losses concentrate (859-trade history) ─
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" "
            python3 - <<'PYEOF'
          import sqlite3
          db = '$HETZNER_PROJECT_DIR/local_learning_storage/cache.sqlite'
          try:
              conn = sqlite3.connect(f'file:{db}?mode=ro', uri=True, timeout=5)
              c = conn.cursor()
              def agg(title, sql):
                  print(f'== {title} ==')
                  for row in c.execute(sql).fetchall():
                      print(' ', row)
              agg('by exit_reason (all)', \"\"\"
                SELECT exit_reason, COUNT(*), SUM(win),
                       ROUND(100.0*SUM(win)/COUNT(*),1) AS wr,
                       ROUND(SUM(pnl_usd),4) AS pnl
                FROM closed_trades GROUP BY exit_reason ORDER BY COUNT(*) DESC\"\"\")
              agg('by regime (all)', \"\"\"
                SELECT COALESCE(regime,'?'), COUNT(*), SUM(win),
                       ROUND(100.0*SUM(win)/COUNT(*),1),
                       ROUND(SUM(pnl_usd),4)
                FROM closed_trades GROUP BY regime ORDER BY COUNT(*) DESC\"\"\")
              agg('by symbol (all)', \"\"\"
                SELECT symbol, COUNT(*), SUM(win),
                       ROUND(100.0*SUM(win)/COUNT(*),1),
                       ROUND(SUM(pnl_usd),4)
                FROM closed_trades GROUP BY symbol ORDER BY SUM(pnl_usd) ASC\"\"\")
              agg('trend: last 100 vs previous 100', \"\"\"
                SELECT 'last100', COUNT(*), SUM(win), ROUND(100.0*SUM(win)/COUNT(*),1), ROUND(SUM(pnl_usd),4)
                FROM (SELECT * FROM closed_trades ORDER BY exit_ts DESC LIMIT 100)\"\"\")
              agg('', \"\"\"
                SELECT 'prev100', COUNT(*), SUM(win), ROUND(100.0*SUM(win)/COUNT(*),1), ROUND(SUM(pnl_usd),4)
                FROM (SELECT * FROM closed_trades ORDER BY exit_ts DESC LIMIT 100 OFFSET 100)\"\"\")
              agg('by side (new rows only)', \"\"\"
                SELECT COALESCE(side,'(legacy NULL)'), COUNT(*), SUM(win),
                       ROUND(100.0*SUM(win)/COUNT(*),1), ROUND(SUM(pnl_usd),4)
                FROM closed_trades GROUP BY side\"\"\")
              agg('by hour of day (UTC, all)', \"\"\"
                SELECT strftime('%H', exit_ts, 'unixepoch'), COUNT(*),
                       ROUND(100.0*SUM(win)/COUNT(*),1), ROUND(SUM(pnl_usd),4)
                FROM closed_trades GROUP BY 1 ORDER BY 4 ASC LIMIT 8\"\"\")
              conn.close()
          except Exception as e:
              print('edge analysis failed:', e)
          PYEOF
          " > artifacts/edge_analysis.txt 2>&1 || echo 'edge ssh failed' >> artifacts/edge_analysis.txt

          # ── MFE distribution of WINNERS (TP=20 pre-flight, reviewer cond #1) ─
          # Does a winner peak >20bps mid-life then decay to a small TIMEOUT gain
          # (TP20 would lock the peak -> PF up) or close at/above its MFE (TP20 clips)?
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" "
            python3 - <<'PYEOF'
          import sqlite3
          db='$HETZNER_PROJECT_DIR/local_learning_storage/cache.sqlite'
          try:
              c=sqlite3.connect(f'file:{db}?mode=ro',uri=True,timeout=5).cursor()
              # winners in last 300 closes: mfe (max favorable %) vs realized pnl_pct
              rows=c.execute(\"SELECT pnl_pct, mfe FROM closed_trades WHERE win=1 AND exit_ts > strftime('%s','now')-604800 ORDER BY exit_ts DESC LIMIT 300\").fetchall()
              n=len(rows); import statistics as st
              mfes=[abs(r[1]) for r in rows if r[1] is not None]
              pnls=[abs(r[0]) for r in rows if r[0] is not None]
              print('winners_n:',n)
              if mfes:
                  print('winner MFE bps: mean=%.1f median=%.1f p25=%.1f p75=%.1f' % (
                      st.mean(mfes)*100, st.median(mfes)*100,
                      sorted(mfes)[len(mfes)//4]*100, sorted(mfes)[3*len(mfes)//4]*100))
              if pnls:
                  print('winner realized pnl bps: mean=%.1f median=%.1f' % (st.mean(pnls)*100, st.median(pnls)*100))
              over20=sum(1 for m in mfes if m*100>=20)
              print('winners with MFE>=20bps: %d/%d (%.0f%%)' % (over20,len(mfes),100*over20/max(len(mfes),1)))
              # decay proof: MFE meaningfully above realized close?
              pairs=[(abs(r[1]),abs(r[0])) for r in rows if r[1] is not None and r[0] is not None]
              decayed=sum(1 for m,p in pairs if m*100>=20 and p < m*0.8)
              print('winners peaked>=20 then gave back >20%%: %d/%d' % (decayed,len(pairs)))
          except Exception as e:
              print('mfe probe failed:',e)
          PYEOF
          " > artifacts/mfe_distribution.txt 2>&1 || echo 'mfe ssh failed' >> artifacts/mfe_distribution.txt

      # ── 3. Print mobile-readable summary ──────────────────────────────────
      - name: Print mobile summary
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "  CryptoMaster — Hetzner Health Fetch"
          echo "  $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "── latest_deploy_status.md ─────────────────────────────────────"
          cat artifacts/latest_deploy_status.md
          echo ""
          echo "── latest_health.md ─────────────────────────────────────────────"
          cat artifacts/latest_health.md
          echo ""
          echo "── service_status.txt ────────────────────────────────────────────"
          cat artifacts/service_status.txt
          echo ""
          echo "── Key counters from health.json ─────────────────────────────────"
          python3 -c "
          import json, sys
          try:
              h = json.load(open('artifacts/latest_health.json'))
              fields = [
                  'status','trading_mode','live_allowed',
                  'paper_train_entry_count','paper_exit_count',
                  'learning_update_ok_count','learning_update_error_count',
                  'bucket_metrics_error_count','app_metrics_save_ok_count',
                  'boot_version_seen','deployed_git_sha',
              ]
              for f in fields:
                  print(f'  {f}: {h.get(f, \"(not present)\")}')
              r = h.get('readiness', {})
              print(f'  paper_train_ok: {r.get(\"paper_train_ok\")}')
          except Exception as e:
              print(f'  (could not parse health.json: {e})')
          " 2>/dev/null || echo "  (python3 json parse failed)"
          echo ""
          echo "  live_real enabled:       no (read-only fetch, no changes made)"
          echo "  ENABLE_REAL_ORDERS:      no"
          echo "  LIVE_TRADING_CONFIRMED:  no"
          echo "════════════════════════════════════════════════════════════════"

      # ── 4. Upload as artifacts ─────────────────────────────────────────────
      - name: Upload health artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cryptomaster-health-${{ github.run_number }}
          path: artifacts/
          retention-days: 14
