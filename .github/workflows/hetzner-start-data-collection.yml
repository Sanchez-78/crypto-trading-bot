name: Hetzner Start Data Collection (F8b observation-only)

# Audit v5 §7/§8: atomically switch the paper bot between PAUSED and
# OBSERVATION-ONLY data collection.
#
#  enable  -> set PAPER_DATA_COLLECTION_ONLY=1 AND remove PAPER_SYMBOL_BLACKLIST
#             in ONE .env edit + ONE restart, so signals fire but every entry is
#             diverted to the F8b shadow recorder (NO position opens). The two keys
#             are always written together, so there is no window where the blacklist
#             is lifted while the observation flag is not yet set.
#  disable -> remove PAPER_DATA_COLLECTION_ONLY AND re-apply the full-symbol
#             blacklist (back to fully paused).
#  status  -> print both keys, no change.
#
# SAFETY: hard-blocks live_real/ENABLE_REAL_ORDERS/LIVE_TRADING_CONFIRMED; a
# zero-open-position gate (fail-closed, UNKNOWN=refuse) runs before the restart;
# auto-rollback restores .env if the service does not come back; after enable it
# verifies [SHADOW_OBSERVE] appears and [SIGNAL_OPENING] does NOT. PAPER ONLY.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'enable (observe) | disable (pause) | status'
        required: true
        default: 'status'
        type: choice
        options: ['enable', 'disable', 'status']

jobs:
  data-collection:
    name: Toggle F8b observation-only data collection
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key and pin host key
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/hetzner_deploy_key
          chmod 600 ~/.ssh/hetzner_deploy_key
          ssh-keyscan -p 22 -T 15 "$HETZNER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          [ -s ~/.ssh/known_hosts ] || { echo "host unreachable"; exit 1; }
          chmod 600 ~/.ssh/known_hosts

      - name: Validate action (fail-closed)
        env:
          ACTION: ${{ inputs.action }}
        run: |
          case "$ACTION" in
            enable|disable|status) echo "validated: action=$ACTION" ;;
            *) echo "::error::invalid action '$ACTION'"; exit 1 ;;
          esac

      - name: Apply on server
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PROJECT_DIR: ${{ secrets.HETZNER_PROJECT_DIR }}
          HETZNER_SERVICE_NAME: ${{ secrets.HETZNER_SERVICE_NAME }}
          ACTION: ${{ inputs.action }}
        run: |
          SSH_OPTS="-p 22 -i ~/.ssh/hetzner_deploy_key -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts -o ConnectTimeout=30 -o BatchMode=yes"
          # ACTION was validated to the enum above, so it is safe to interpolate.
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" \
            "PROJECT_DIR='$HETZNER_PROJECT_DIR' SERVICE_NAME='$HETZNER_SERVICE_NAME' ACTION='$ACTION' bash -s" << 'REMOTE_EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$PROJECT_DIR"
          BLACKLIST_ALL="BTCUSDT,ETHUSDT,ADAUSDT,BNBUSDT,DOTUSDT,SOLUSDT,XRPUSDT"

          # ── Safety gates: never proceed with live flags ──────────────────
          for pair in "TRADING_MODE live_real" "ENABLE_REAL_ORDERS true" "LIVE_TRADING_CONFIRMED true"; do
            key="${pair% *}"; bad="${pair#* }"
            v="$(grep -E "^[[:space:]]*(export[[:space:]]+)?${key}=" .env 2>/dev/null | tail -1 | cut -d= -f2- | tr -d '\"'"'"' ' | tr 'A-Z' 'a-z' || true)"
            if [ "$v" = "$bad" ] || { [ "$bad" = "true" ] && { [ "$v" = "1" ] || [ "$v" = "yes" ] || [ "$v" = "on" ]; }; }; then
              echo "CRITICAL: .env has ${key}=${v} — refusing to touch anything"; exit 1
            fi
          done
          echo "safety gates OK"

          echo "== CURRENT =="
          grep -nE "^(PAPER_DATA_COLLECTION_ONLY|PAPER_SYMBOL_BLACKLIST)=" .env || echo "(neither key set)"

          if [ "$ACTION" = "status" ]; then exit 0; fi

          # ── Zero-open-position gate (fail-closed) before any restart ──────
          pos_count="$(python3 - "data/paper_open_positions.json" <<'PYEOF'
          import json, sys
          try:
              d = json.load(open(sys.argv[1]))
              print(len(d) if isinstance(d, (dict, list)) else "UNKNOWN")
          except FileNotFoundError:
              print("UNKNOWN")
          except Exception:
              print("UNKNOWN")
          PYEOF
          )"
          if [ "$pos_count" != "0" ]; then
            echo "REFUSING: open-position state = '$pos_count' (fail-closed) — no change"; exit 1
          fi
          echo "zero-position gate OK"

          # Atomic .env writer: strip both keys (matching the SAME variants as the
          # safety gate: export/indented) then append the desired one into a temp
          # file and `mv` it into place — a single rename, so a crash mid-edit can
          # never leave the blacklist gone AND the flag unset on disk.
          write_env() {  # $1 = "flag" (enable) | "blacklist" (pause)
            local t; t="$(mktemp "$PROJECT_DIR/.env.new.XXXXXX")"
            grep -vE '^[[:space:]]*(export[[:space:]]+)?(PAPER_DATA_COLLECTION_ONLY|PAPER_SYMBOL_BLACKLIST)=' .env > "$t" || true
            if [ "$1" = "flag" ]; then echo "PAPER_DATA_COLLECTION_ONLY=1" >> "$t"
            else echo "PAPER_SYMBOL_BLACKLIST=$BLACKLIST_ALL" >> "$t"; fi
            chmod --reference=.env "$t" 2>/dev/null || true
            mv "$t" .env
          }

          cp .env .env.bak.datacoll
          if [ "$ACTION" = "enable" ]; then write_env flag; else write_env blacklist; fi
          echo "applied ($ACTION): $(grep -E '^(PAPER_DATA_COLLECTION_ONLY|PAPER_SYMBOL_BLACKLIST)=' .env || echo '(neither key)')"

          # ── Restart + verify (auto-rollback on failure) ───────────────────
          # POLL is-active up to ~100s: the bot's full init (warmup + hydration)
          # takes longer than a single short sleep, so a one-shot check false-fails
          # and rolls back a healthy start. Only roll back if it truly never comes up.
          systemctl restart "$SERVICE_NAME"
          active="false"
          for _ in $(seq 1 20); do
            sleep 5
            if systemctl is-active --quiet "$SERVICE_NAME"; then active="true"; break; fi
          done
          if [ "$active" != "true" ]; then
            echo "ROLLBACK: service not active after ~100s — restoring .env"
            mv .env.bak.datacoll .env
            systemctl restart "$SERVICE_NAME"
            exit 1
          fi

          # ── Post-enable verification: POSITIVE confirmation required ───────
          # Poll up to ~4 min. PASS only if SHADOW_OBSERVE is positively seen AND no
          # SIGNAL_OPENING. "No signal in the window" or an unreadable/empty journal
          # is treated as FAILURE -> re-pause (fail-closed). Never infer safety from
          # silence. This also DIRECTLY proves the flag stops position opening.
          # Poll up to ~30 min — the bot warms up after restart and only signals
          # roughly every ~20 min, so a short window sees nothing. Outcomes:
          #  * SIGNAL_OPENING seen  -> flag did NOT take -> re-pause + exit 1 (the
          #    real danger: the bot is opening positions while we intended observe).
          #  * SHADOW_OBSERVE seen  -> flag confirmed working -> exit 0.
          #  * neither (quiet/warming up) -> the flag IS applied and NO opens
          #    occurred, so it is SAFE to leave ON. We do NOT revert to the blacklist
          #    on silence (that blacklist does not reliably stop entries and removing
          #    a working flag would be worse). Exit 0 PENDING; re-check later.
          if [ "$ACTION" = "enable" ]; then
            confirmed="false"; opened_seen="false"
            for _ in $(seq 1 90); do
              sleep 20
              logs="$(journalctl -u "$SERVICE_NAME" --since '35 minutes ago' --no-pager -o cat 2>/dev/null || true)"
              opened="$(printf '%s\n' "$logs" | grep -c 'SIGNAL_OPENING' || true)"
              obs="$(printf '%s\n' "$logs" | grep -c 'SHADOW_OBSERVE' || true)"
              if [ "${opened:-0}" -gt 0 ]; then opened_seen="true"; break; fi
              if [ "${obs:-0}" -gt 0 ]; then confirmed="true"; break; fi
            done
            if [ "$opened_seen" = "true" ]; then
              echo "CRITICAL: SIGNAL_OPENING seen while data-collection intended — the flag did NOT take. Re-pausing (fail-closed)."
              write_env blacklist
              systemctl restart "$SERVICE_NAME"
              exit 1
            elif [ "$confirmed" = "true" ]; then
              echo "[DATA_COLLECTION_ENABLED_OK] SHADOW_OBSERVE confirmed, no SIGNAL_OPENING"
            else
              echo "[DATA_COLLECTION_ENABLED_PENDING] flag applied; no signals in the 30-min window (bot warming up / quiet) and NO position opens observed — leaving the flag ON. Re-check the journal for SHADOW_OBSERVE vs SIGNAL_OPENING later."
            fi
          fi
          echo "live_real: no (gate-checked)"
          REMOTE_EOF
