name: Hetzner Recover Stuck Position (manual, gated)

# ONE-OFF incident recovery for the catch-22 that hetzner-deploy-apply cannot
# resolve: a paper position got stuck OPEN past any sane age (observed 14.5h) due
# to an unbounded effective-hold, and the fix that closes it (_HARD_MAX_AGE_S,
# PR #110) can only take effect after a restart with the new code — but
# deploy-apply's zero-open-position gate (correctly) refuses to restart while a
# position is open. This workflow breaks the loop SAFELY:
#   1. inputs validated (enum + hex) before the remote shell;
#   2. live-flag safety refuses on any real-trading indicator;
#   3. STAGING compile of the target (no live touch);
#   4. back up the open-positions JSON;
#   5. STOP bot -> git reset --hard target -> START bot (new code);
#   6. the new hard-cap code times out the stuck position within a scan;
#   7. poll: is-active AND ready_bot_sha == target AND open_positions == 0;
#   8. on any failure -> rollback to the previous SHA + restart.
# confirm=STATUS is a read-only dry run (1-4 + show state, no stop/reset).
# Paper-only. Never touches real-order paths. Delete after use.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'STATUS (dry-run) | RECOVER (stop+reset+start, drains stuck position)'
        required: true
        default: 'STATUS'
        type: choice
        options: ['STATUS', 'RECOVER']
      target_sha:
        description: 'Full 40-hex commit to deploy. Empty = origin/main HEAD.'
        required: false
        default: ''

jobs:
  recover:
    name: Recover stuck position + deploy fix
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key and pin host key
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/hetzner_deploy_key
          chmod 600 ~/.ssh/hetzner_deploy_key
          ssh-keyscan -p 22 -T 15 "$HETZNER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          [ -s ~/.ssh/known_hosts ] || { echo "host unreachable"; exit 1; }
          chmod 600 ~/.ssh/known_hosts

      - name: Validate inputs (fail-closed, anti-injection)
        env:
          CONFIRM: ${{ inputs.confirm }}
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          python3 - "$CONFIRM" "$TARGET_SHA" <<'PY'
          import re, sys
          confirm, target = sys.argv[1], (sys.argv[2] if len(sys.argv) > 2 else "")
          if confirm not in ("STATUS", "RECOVER"):
              print(f"::error::invalid confirm '{confirm}'"); sys.exit(1)
          if target and not re.fullmatch(r"[0-9a-fA-F]{40}", target):
              print(f"::error::target_sha must be empty or a full 40-hex commit"); sys.exit(1)
          print(f"validated: confirm={confirm} target={'origin/main HEAD' if not target else target}")
          PY

      - name: Recover on server (gated)
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PROJECT_DIR: ${{ secrets.HETZNER_PROJECT_DIR }}
          HETZNER_SERVICE_NAME: ${{ secrets.HETZNER_SERVICE_NAME }}
          CONFIRM: ${{ inputs.confirm }}
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          SSH_OPTS="-p 22 -i ~/.ssh/hetzner_deploy_key -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts -o ConnectTimeout=30 -o BatchMode=yes"
          mkdir -p artifacts
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" \
            "PROJECT_DIR='$HETZNER_PROJECT_DIR' SERVICE_NAME='$HETZNER_SERVICE_NAME' CONFIRM='$CONFIRM' TARGET_SHA='$TARGET_SHA' bash -s" << 'REMOTE_EOF' | tee artifacts/recover.txt
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$PROJECT_DIR"
          PYTHON_BIN="${PYTHON_BIN:-python3}"
          if [ "$(id -u)" = "0" ]; then export HOME="${HOME:-/root}"; fi
          git config --global --get-all safe.directory 2>/dev/null | grep -qx '\*' \
            || git config --global --add safe.directory '*' 2>/dev/null || true
          POS="data/paper_open_positions.json"

          count_pos() {
            $PYTHON_BIN - "$POS" <<'PYEOF'
          import json, sys
          try:
              d = json.load(open(sys.argv[1]))
              print(len(d) if isinstance(d, (dict, list)) else "UNKNOWN")
          except FileNotFoundError:
              print(0)
          except Exception:
              print("UNKNOWN")
          PYEOF
          }
          read_marker() { { cat "$1" 2>/dev/null || true; } | tr -d '[:space:]'; }

          # ── live-flag safety refuse ───────────────────────────────────────
          for pair in "TRADING_MODE live_real" "ENABLE_REAL_ORDERS true" "LIVE_TRADING_CONFIRMED true"; do
            key="${pair% *}"; bad="${pair#* }"
            v="$(grep -E "^[[:space:]]*(export[[:space:]]+)?${key}=" .env 2>/dev/null | tail -1 | cut -d= -f2- | tr -d '\"'"'"' ' | tr 'A-Z' 'a-z' || true)"
            if [ "$v" = "$bad" ] || { [ "$bad" = "true" ] && { [ "$v" = "1" ] || [ "$v" = "yes" ] || [ "$v" = "on" ]; }; }; then
              echo "CRITICAL: .env has ${key}=${v} — refusing"; exit 1
            fi
          done
          echo "safety gates OK"

          git fetch origin main 2>&1 | tail -2
          if [ -n "${TARGET_SHA:-}" ]; then target="$TARGET_SHA"; else target="$(git rev-parse origin/main)"; fi
          git cat-file -e "${target}^{commit}" 2>/dev/null || { echo "CRITICAL: target $target not reachable"; exit 1; }
          old_sha="$(git rev-parse HEAD)"
          echo "=== BEFORE === live=$old_sha target=$target open_positions=$(count_pos)"

          # ── STAGING compile of the target (no live touch) ─────────────────
          STAGING="$(mktemp -d /tmp/cm-recover.XXXXXX)"
          if git worktree add --detach "$STAGING" "$target" >/dev/null 2>&1; then
            ( cd "$STAGING" && $PYTHON_BIN -m compileall -q src bot2 ) 2>&1 | tail -5 \
              || { echo "CRITICAL: staging compile failed — not recovering"; git worktree remove --force "$STAGING" 2>/dev/null || true; exit 1; }
            git worktree remove --force "$STAGING" 2>/dev/null || true
            echo "staging compile OK"
          else
            echo "CRITICAL: could not stage target — not recovering"; exit 1
          fi

          if [ "$CONFIRM" != "RECOVER" ]; then
            echo "STATUS mode — no stop/reset/restart performed."; exit 0
          fi

          # ── STOP -> backup -> switch -> START (bot stopped = no JSON race) ─
          echo "=== RECOVER: stop $SERVICE_NAME ==="
          systemctl stop "$SERVICE_NAME" 2>&1 | tail -2 || true
          sleep 2
          [ -f "$POS" ] && cp "$POS" "${POS}.bak.$(date -u +%Y%m%dT%H%M%SZ)" 2>/dev/null && echo "backed up $POS" || true
          echo "switching $old_sha -> $target"
          git reset --hard "$target" 2>&1 | tail -2
          echo "=== START $SERVICE_NAME (new code: hard-cap will time out the stuck position) ==="
          systemctl start "$SERVICE_NAME"

          # ── poll: active AND ready==target AND positions drained to 0 ──────
          ok=0
          for i in $(seq 1 36); do   # ~180s
            sleep 5
            systemctl is-active --quiet "$SERVICE_NAME" || { echo "  poll $i: not active yet"; continue; }
            c="$(count_pos)"; ready="$(read_marker reports/ready_bot_sha)"
            echo "  poll $i: active open_positions=$c ready=${ready:0:12}"
            if [ "$c" = "0" ] && [ "$ready" = "$target" ]; then ok=1; break; fi
          done

          if [ "$ok" = "1" ]; then
            echo "[RECOVER_OK] live=$target open_positions=0 READY converged"
            exit 0
          fi

          echo "[RECOVER_FAIL] positions did not drain to 0 / not READY — ROLLING BACK to $old_sha"
          git reset --hard "$old_sha" 2>&1 | tail -2
          systemctl restart "$SERVICE_NAME"; sleep 5
          systemctl is-active --quiet "$SERVICE_NAME" && echo "[ROLLBACK_OK] restored $old_sha" || echo "[ROLLBACK_WARN] service not active after rollback — investigate"
          exit 1
          REMOTE_EOF

      - name: Upload recover log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recover-log
          path: artifacts/
          retention-days: 14
