name: Hetzner Run Maker-Fill Model v2 (read-only)

# Runs scripts/maker_fill_model_v2.py (M2, corrected/executable) on the server against
# the enriched shadow dataset (shadow_excursion.sqlite, opened mode=ro) and returns the
# JSON as an artifact + a coverage summary. READ-ONLY: no writes, no restart, no trading
# change. Script pulled from origin/main into /tmp (never touches the live tree).
# The GO gate is hard-locked off unless coverage/regime/fill thresholds are met, so a
# run on thin/early data reports coverage only — never a false GO.

on:
  workflow_dispatch:

jobs:
  run-model-v2:
    name: Run maker-fill model v2 (read-only)
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key and pin host key
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/hetzner_deploy_key
          chmod 600 ~/.ssh/hetzner_deploy_key
          ssh-keyscan -p 22 -T 15 "$HETZNER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          [ -s ~/.ssh/known_hosts ] || { echo "host unreachable"; exit 1; }
          chmod 600 ~/.ssh/known_hosts

      - name: Run model v2 on server (read-only)
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PROJECT_DIR: ${{ secrets.HETZNER_PROJECT_DIR }}
        run: |
          SSH_OPTS="-p 22 -i ~/.ssh/hetzner_deploy_key -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts -o ConnectTimeout=30 -o BatchMode=yes"
          mkdir -p artifacts
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" \
            "DIR='${HETZNER_PROJECT_DIR:-/opt/cryptomaster}' bash -s" << 'REMOTE_EOF' > artifacts/maker_model_v2.json
          set -euo pipefail
          cd "$DIR"
          export HOME="${HOME:-/root}"
          git config --global --add safe.directory "$DIR" 2>/dev/null || true
          git fetch origin main >/dev/null 2>&1 || true
          git show origin/main:scripts/maker_fill_model_v2.py > /tmp/mfm2.py
          DB="$DIR/local_learning_storage/shadow_excursion.sqlite"
          if [ ! -f "$DB" ]; then echo "{\"error\":\"shadow db not found\"}"; exit 0; fi
          python3 /tmp/mfm2.py "$DB"
          rm -f /tmp/mfm2.py 2>/dev/null || true
          REMOTE_EOF

      - name: Print summary
        run: |
          echo "════════ Maker-fill model v2 (coverage + GO) ════════"
          python3 - <<'PY'
          import json
          d = json.load(open('artifacts/maker_model_v2.json'))
          if 'error' in d:
              print('ERROR:', d['error']); raise SystemExit(0)
          print('n_obs_ok:', d.get('n_obs_ok'), '| n_admissible:', d.get('n_admissible'))
          print('has_spread_column:', d.get('has_spread_column'),
                '| admission_feature_fraction:', d.get('admission_feature_fraction'))
          print('regimes:', d.get('regimes'))
          print('coverage_ok_for_GO:', d.get('coverage_ok_for_GO'), '| GO:', d.get('GO'))
          print('note:', d.get('note'))
          for s, wf in (d.get('walk_forward') or {}).items():
              print(f'--- {s} ---')
              print(json.dumps(wf, indent=2))
          PY

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: maker-model-v2-result-${{ github.run_number }}
          path: artifacts/
          retention-days: 14
