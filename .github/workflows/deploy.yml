name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/cryptomaster
            git config --global --add safe.directory /opt/cryptomaster
            git fetch origin main
            LOCAL=$(git rev-parse HEAD)
            REMOTE=$(git rev-parse origin/main)
            git pull origin main

            # Validate entrypoint exists and compiles
            test -f start.py || { echo "ERROR: start.py not found"; exit 1; }
            /opt/cryptomaster/venv/bin/python -m py_compile start.py || { echo "ERROR: start.py syntax error"; exit 1; }

            # Validate critical runtime modules compile
            /opt/cryptomaster/venv/bin/python -m py_compile bot2/main.py || { echo "ERROR: bot2/main.py syntax error"; exit 1; }
            /opt/cryptomaster/venv/bin/python -m py_compile src/services/runtime_flags.py || { echo "ERROR: runtime_flags.py syntax error"; exit 1; }
            /opt/cryptomaster/venv/bin/python -m py_compile src/services/firebase_client.py || { echo "ERROR: firebase_client.py syntax error"; exit 1; }

            echo "[DEPLOY] Compilation validation passed"

            # Restart service
            systemctl restart cryptomaster
            sleep 3
            systemctl is-active cryptomaster || { echo "ERROR: cryptomaster service failed to start"; exit 1; }

            echo "[DEPLOY] Successfully deployed and service is active"
