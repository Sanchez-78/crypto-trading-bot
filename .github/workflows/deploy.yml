name: Deploy to Hetzner

# 2026-07-14: paths filter added. This workflow restarts cryptomaster on
# EVERY push to main; observability/tests/docs merges were restarting the
# bot every ~5 min, killing open positions before their 15-min timeout
# (evidence: restart_forensics.txt — systemd "Stopping" at 20:33/20:38/20:44,
# exactly correlated with PR #29/#30/#31 merges). Restart only when runtime
# code actually changes; workflow/tests/docs changes deploy via the 2h
# autodeploy timer without a restart (it restarts only on SHA change with
# code impact — and even then only after its test gate).
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'bot2/**'
      - 'start.py'
      - 'start_flask_dashboard.py'
      - 'requirements.txt'
      - 'requirements-dashboard.txt'
      - 'config.py'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e

            echo "========== DEPLOYING LEGACY BOT =========="
            cd /opt/cryptomaster
            git config --global --add safe.directory /opt/cryptomaster

            # Abort any stuck merge conflict
            git merge --abort 2>/dev/null || true

            # Stash any local changes (e.g., runtime SQLite files modified by live bot)
            git stash -u || true

            git fetch origin main
            REMOTE=$(git rev-parse origin/main)
            git pull origin main

            # Ensure virtualenv exists
            if [ ! -f venv/bin/python ]; then
              echo "[DEPLOY] Virtualenv missing, creating..."
              python3 -m venv venv
              venv/bin/pip install --upgrade pip setuptools wheel
              [ -f requirements.txt ] && venv/bin/pip install -r requirements.txt
              echo "[DEPLOY] Virtualenv created ✓"
            fi

            # Validate entrypoint
            test -f start.py || { echo "ERROR: start.py not found"; exit 1; }
            ./venv/bin/python -m py_compile start.py || { echo "ERROR: start.py syntax error"; exit 1; }
            ./venv/bin/python -m py_compile bot2/main.py || { echo "ERROR: bot2/main.py syntax error"; exit 1; }
            ./venv/bin/python -m py_compile src/services/runtime_flags.py || { echo "ERROR: runtime_flags.py syntax error"; exit 1; }
            ./venv/bin/python -m py_compile src/services/firebase_client.py || { echo "ERROR: firebase_client.py syntax error"; exit 1; }

            echo "[DEPLOY] Legacy compilation validation passed"
            systemctl restart cryptomaster
            sleep 3
            systemctl is-active cryptomaster || { echo "ERROR: cryptomaster service failed to start"; exit 1; }
            echo "[DEPLOY] Legacy bot deployed and active ✓"

            echo ""
            echo "========== DEPLOYING V5 PAPER BOT =========="
            cd /opt/cryptomaster_v5_validation
            git config --global --add safe.directory /opt/cryptomaster_v5_validation
            git config pull.ff only
            git fetch origin main
            git reset --hard origin/main

            # Ensure virtualenv exists
            if [ ! -f venv/bin/python ]; then
              echo "[DEPLOY] V5 virtualenv missing, creating..."
              python3 -m venv venv
              venv/bin/pip install --upgrade pip setuptools wheel
              [ -f requirements.txt ] && venv/bin/pip install -r requirements.txt
              echo "[DEPLOY] V5 virtualenv created ✓"
            fi

            # Validate V5 entrypoint
            test -f src/v5_bot/paper/__main__.py || { echo "ERROR: V5 __main__.py not found"; exit 1; }
            ./venv/bin/python -m py_compile src/v5_bot/paper/__main__.py || { echo "ERROR: V5 __main__.py syntax error"; exit 1; }
            ./venv/bin/python -m py_compile src/v5_bot/paper/runner.py || { echo "ERROR: V5 runner.py syntax error"; exit 1; }
            ./venv/bin/python -m py_compile src/v5_bot/firebase/repository.py || { echo "ERROR: V5 repository.py syntax error"; exit 1; }

            echo "[DEPLOY] V5 compilation validation passed"
            systemctl restart cryptomaster-v5-paper || { echo "[WARN] systemctl restart returned error (may be expected)"; }
            sleep 5
            echo "[DEPLOY] V5 Paper bot restart initiated ✓"
            echo "[DEPLOY] Service logs (last 10 lines) after restart:"
            journalctl -u cryptomaster-v5-paper -n 10 --no-pager 2>/dev/null || echo "  (logs not yet available)"

            echo ""
            echo "[DEPLOY] ✅ ALL DEPLOYMENTS SUCCESSFUL"
