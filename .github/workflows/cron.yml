name: Crypto Signal System

on:
  schedule:
    - cron: "*/15 * * * *"   # signals — every 15 minutes
    - cron: "0 0 * * *"      # evaluation — daily at midnight UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: signals | evaluate"
        required: false
        default: signals

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 0 * * *" ]; then
            echo "mode=evaluate" >> "$GITHUB_OUTPUT"
          else
            echo "mode=signals" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug files
        run: ls -la && pwd

      - name: Run
        env:
          FIREBASE_KEY_BASE64: ${{ secrets.FIREBASE_KEY_BASE64 }}
        run: python main.py ${{ steps.mode.outputs.mode }}
