name: Hetzner Restore Dashboard (manual)

# Incident recovery (2026-07-17): the server autodeploys `main` on a timer, so
# PR5's fail-closed auth + localhost bind landed by default and locked the
# Android app out (503 auth_not_configured). The ship-dark hotfix makes that
# security posture opt-in (DASHBOARD_SECURITY_ENABLED, default off). This
# workflow syncs the hotfix to the server and restarts ONLY the dashboard unit
# so it comes back up open (0.0.0.0, no auth) exactly as before PR5.
#
# It does NOT touch cryptomaster.service (the trading bot) and makes no trading
# change. Read-mostly: fast-forward the repo + restart the dashboard + verify.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESTORE_DASHBOARD to act (or STATUS for read-only)'
        required: true
        default: 'STATUS'

jobs:
  restore-dashboard:
    name: Sync hotfix + restart dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key and pin host key
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/hetzner_deploy_key
          chmod 600 ~/.ssh/hetzner_deploy_key
          ssh-keyscan -p 22 -T 15 "$HETZNER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          [ -s ~/.ssh/known_hosts ] || { echo "host unreachable"; exit 1; }
          chmod 600 ~/.ssh/known_hosts

      - name: Sync hotfix + restart dashboard
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PROJECT_DIR: ${{ secrets.HETZNER_PROJECT_DIR }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          SSH_OPTS="-p 22 -i ~/.ssh/hetzner_deploy_key -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts -o ConnectTimeout=30 -o BatchMode=yes"
          ssh $SSH_OPTS "$HETZNER_USER@$HETZNER_HOST" \
            "DIR='${HETZNER_PROJECT_DIR:-/opt/cryptomaster}' CONFIRM='$CONFIRM' bash -s" << 'REMOTE_EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$DIR"
          export HOME="${HOME:-/root}"
          git config --global --add safe.directory "$DIR" 2>/dev/null || true

          echo "=== BEFORE ==="
          echo "current SHA: $(git rev-parse --short HEAD 2>/dev/null || echo unknown)"
          echo "dashboard health (localhost):"
          curl -fsS "http://127.0.0.1:5001/api/dashboard/metrics" 2>/dev/null | head -c 300 || echo "  (unreachable / degraded)"
          echo ""

          # Safety: never act if .env indicates live trading (defense-in-depth;
          # this workflow does not touch trading, but refuse on any live flag).
          if [ -f .env ]; then
            v() { grep -E "^[[:space:]]*(export[[:space:]]+)?$1=" .env | tail -1 | cut -d= -f2- | sed 's/[[:space:]]*#.*$//' | tr -d '"'"'"' ' | tr 'A-Z' 'a-z' || true; }
            is_true() { case "$1" in true|1|yes|on) return 0;; *) return 1;; esac; }
            if [ "$(v TRADING_MODE)" = "live_real" ] || is_true "$(v ENABLE_REAL_ORDERS)" || is_true "$(v LIVE_TRADING_CONFIRMED)"; then
              echo "CRITICAL: live flag in .env — refusing"; exit 1
            fi
          fi

          # Dashboard-unit diagnostics (read-only) — printed in BOTH modes so a
          # STATUS run reveals exactly why the unit is down (start failure vs
          # crash-loop vs missing user/credential).
          DUNIT=""
          for u in cryptomaster-dashboard cryptomaster-dashboard.service; do
            if systemctl cat "$u" >/dev/null 2>&1; then DUNIT="$u"; break; fi
          done
          echo "=== DASHBOARD UNIT DIAGNOSTICS ($DUNIT) ==="
          if [ -n "$DUNIT" ]; then
            systemctl show "$DUNIT" -p ActiveState -p SubState -p Result -p ExecMainStatus -p NRestarts -p User 2>&1 || true
            echo "--- last 30 journal lines (sanitized) ---"
            journalctl -u "$DUNIT" -n 30 --no-pager -o short-iso 2>/dev/null \
              | sed 's/\(key\|token\|secret\|password\)\([=: ]\+\)[^ ,"'"'"']\+/\1\2[REDACTED]/gi' \
              || echo "  (journal unavailable)"
          else
            echo "  (dashboard unit not found)"
          fi
          echo "--- installed unit head (/etc/systemd) ---"
          sed -n '1,45p' /etc/systemd/system/cryptomaster-dashboard.service 2>/dev/null || echo "  (no installed unit)"
          echo "--- dashboard user / credential presence ---"
          id cryptomaster-dashboard 2>&1 || echo "  user cryptomaster-dashboard MISSING"
          [ -f /etc/cryptomaster/dashboard_api_token ] && echo "  credential file: present" || echo "  credential file: ABSENT"
          echo ""

          if [ "$CONFIRM" != "RESTORE_DASHBOARD" ]; then
            echo "STATUS mode — no changes made."; exit 0
          fi

          echo "=== SYNC hotfix (fast-forward to origin/main) ==="
          git fetch origin main
          git reset --hard origin/main
          echo "new SHA: $(git rev-parse --short HEAD)"

          echo "=== RESTART dashboard unit ONLY (trading bot untouched) ==="
          UNIT=""
          for u in cryptomaster-dashboard cryptomaster-dashboard.service; do
            if systemctl list-unit-files "$u" >/dev/null 2>&1 && systemctl cat "$u" >/dev/null 2>&1; then UNIT="$u"; break; fi
          done
          [ -n "$UNIT" ] || { echo "ERROR: dashboard unit not found"; exit 1; }

          # Install the tracked unit if it differs from the live one — this carries
          # the permanent fix (no PartOf=cryptomaster.service + StartLimitIntervalSec=0
          # + ship-dark OPEN posture). git reset above does NOT touch /etc/systemd.
          # Needs root; warns and continues (code fix still applies) if it cannot write.
          #
          # SAFETY (2026-07-19 incident): a previous run installed the HARDENED unit
          # over the working open one; systemd refused to start it (User= missing,
          # LoadCredential= source absent) and the API went down. So: BACK UP the live
          # unit first, verify the dashboard actually serves after restart, and AUTO-
          # ROLLBACK to the backup if it does not.
          SRC="$DIR/systemd/cryptomaster-dashboard.service"
          DEST="/etc/systemd/system/cryptomaster-dashboard.service"
          BAK=""
          INSTALLED=0
          if [ -f "$SRC" ] && ! cmp -s "$SRC" "$DEST" 2>/dev/null; then
            if [ -f "$DEST" ]; then BAK="${DEST}.bak.$(date -u +%Y%m%dT%H%M%SZ 2>/dev/null || echo prev)"; cp "$DEST" "$BAK" 2>/dev/null && echo "backed up live unit -> $BAK" || BAK=""; fi
            if cp "$SRC" "$DEST" 2>/dev/null; then
              systemctl daemon-reload && INSTALLED=1 && echo "installed updated dashboard unit + daemon-reload"
            else
              echo "WARNING: cannot write $DEST (not root?) — unit not updated"
            fi
          fi
          # Clear any prior start-rate-limit 'failed' state so the restart actually starts.
          systemctl reset-failed "$UNIT" 2>/dev/null || true
          systemctl restart "$UNIT" 2>/dev/null || echo "  (restart returned non-zero)"

          # Verify it actually comes up (Flask init is slow): poll is-active + a real
          # HTTP 200 from the metrics endpoint for up to ~40s before judging.
          verify_up() {
            for _ in $(seq 1 20); do
              if systemctl is-active "$1" >/dev/null 2>&1 \
                 && curl -fsS -m 4 "http://127.0.0.1:5001/api/dashboard/metrics" >/dev/null 2>&1; then
                return 0
              fi
              sleep 2
            done
            return 1
          }

          if verify_up "$UNIT"; then
            echo "VERIFY: dashboard is active and serving 200 JSON."
            # Success — prune the backup we just made (keep /etc tidy).
            [ -n "$BAK" ] && rm -f "$BAK" 2>/dev/null || true
          else
            echo "VERIFY FAILED: dashboard not serving after restart."
            systemctl show "$UNIT" -p ActiveState -p SubState -p Result -p ExecMainStatus 2>&1 || true
            journalctl -u "$UNIT" -n 15 --no-pager -o short-iso 2>/dev/null | sed 's/\(key\|token\|secret\|password\)\([=: ]\+\)[^ ,"'"'"']\+/\1\2[REDACTED]/gi' || true
            if [ "$INSTALLED" = "1" ] && [ -n "$BAK" ] && [ -f "$BAK" ]; then
              echo "=== AUTO-ROLLBACK: restoring previous unit $BAK ==="
              cp "$BAK" "$DEST" 2>/dev/null && systemctl daemon-reload && echo "  restored previous unit"
              systemctl reset-failed "$UNIT" 2>/dev/null || true
              systemctl restart "$UNIT" 2>/dev/null || true
              if verify_up "$UNIT"; then
                echo "  ROLLBACK OK: previous unit is serving again."
                rm -f "$BAK" 2>/dev/null || true
              else
                echo "  ROLLBACK did NOT restore service — manual intervention needed. Backup kept at $BAK"
              fi
            else
              echo "  No usable backup to roll back to (INSTALLED=$INSTALLED, BAK=$BAK)."
            fi
          fi

          echo "=== AFTER ==="
          systemctl is-active "$UNIT" || echo "  (dashboard not active!)"
          echo "healthz:"; curl -fsS -m 4 "http://127.0.0.1:5001/healthz" 2>/dev/null || echo "  (healthz failed)"
          echo ""
          echo "metrics (must be 200 JSON, NOT auth_not_configured):"
          curl -fsS -m 4 "http://127.0.0.1:5001/api/dashboard/metrics" 2>/dev/null | head -c 400 || echo "  (metrics failed)"
          echo ""
          echo "[RESTORE] cryptomaster.service left untouched: $(systemctl is-active cryptomaster 2>/dev/null || echo unknown)"
          REMOTE_EOF
